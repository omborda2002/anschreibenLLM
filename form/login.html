<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feder — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0c0c0b; --surface:#141412; --border:#222220; --gold:#c8a96e; --gold-dim:#8a7048; --text:#f0ebe0; --muted:#6b6860; --danger:#e07070; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }
  .wrapper { width:100%; max-width:380px; }
  .header { text-align:center; margin-bottom:40px; }
  .logo { font-family:'Playfair Display',serif; font-size:32px; font-weight:400; letter-spacing:0.04em; margin-bottom:6px; }
  .logo span { color:var(--gold); }
  .tagline { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
  .card { background:var(--surface); border:1px solid var(--border); padding:36px; }
  .field-label { display:block; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  input[type="password"] { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:14px 16px; font-size:13.5px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s; letter-spacing:0.05em; }
  input[type="password"]:focus { border-color:var(--gold-dim); }
  input[type="password"]::placeholder { color:#2e2e2c; letter-spacing:0; }
  .btn-login { width:100%; background:var(--gold); border:none; color:var(--bg); padding:13px 32px; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:500; transition:opacity 0.2s; margin-top:20px; }
  .btn-login:hover { opacity:0.88; }
  .error-msg { display:none; background:#1a1010; border:1px solid #4a2020; color:var(--danger); padding:12px 16px; font-size:13px; margin-top:16px; }
  .divider { height:1px; background:var(--border); margin:24px 0; }
  .hint { font-size:11px; color:var(--muted); text-align:center; letter-spacing:0.05em; }
  .footer { margin-top:28px; text-align:center; font-size:11px; color:#3a3a38; letter-spacing:0.1em; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="logo">Fe<span>d</span>er</div>
    <div class="tagline">Anschreiben Generator</div>
  </div>

  <div class="card">
    <form method="POST" action="/login">
      <label class="field-label">Password</label>
      <input type="password" name="password" placeholder="Enter password" autofocus autocomplete="current-password" />

      <div class="error-msg" id="error-msg">Incorrect password. Try again.</div>

      <button type="submit" class="btn-login">Enter →</button>
    </form>

    <div class="divider"></div>
    <div class="hint">Access is restricted — private use only.</div>
  </div>
</div>

<div class="footer">PROVIDED BY OM BORDA</div>

</body>
</html>
