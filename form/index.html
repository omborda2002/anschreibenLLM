<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feder — Anschreiben Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0c0c0b; --surface:#141412; --border:#222220; --gold:#c8a96e; --gold-dim:#8a7048; --text:#f0ebe0; --muted:#6b6860; --danger:#e07070; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }
  .wrapper { width:100%; max-width:620px; }
  .header { text-align:center; margin-bottom:40px; }
  .logo { font-family:'Playfair Display',serif; font-size:32px; font-weight:400; letter-spacing:0.04em; margin-bottom:6px; }
  .logo span { color:var(--gold); }
  .tagline { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
  .card { background:var(--surface); border:1px solid var(--border); padding:36px; }
  .row-toggles { display:flex; gap:24px; margin-bottom:28px; }
  .toggle-group { display:flex; flex-direction:column; gap:8px; }
  .toggle-label { font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
  .toggles { display:flex; gap:6px; }
  .toggle-btn { padding:8px 14px; background:var(--bg); border:1px solid var(--border); color:var(--muted); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .toggle-btn:hover { border-color:#333; color:var(--text); }
  .toggle-btn.active { background:#1c1810; border-color:var(--gold); color:var(--gold); }
  .field-label { display:block; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:16px; font-size:13.5px; font-family:'DM Sans',sans-serif; line-height:1.6; outline:none; resize:vertical; min-height:300px; transition:border-color 0.2s; }
  textarea:focus { border-color:var(--gold-dim); }
  textarea::placeholder { color:#2e2e2c; }
  .card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:20px; }
  .hint { font-size:12px; color:var(--muted); line-height:1.6; }
  .btn-generate { background:var(--gold); border:none; color:var(--bg); padding:13px 32px; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:500; transition:opacity 0.2s; white-space:nowrap; }
  .btn-generate:hover { opacity:0.88; }
  .btn-generate:disabled { opacity:0.25; cursor:not-allowed; }
  .loading-overlay { display:none; position:fixed; inset:0; background:rgba(12,12,11,0.9); z-index:100; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
  .loading-overlay.visible { display:flex; }
  .spinner { width:40px; height:40px; border:1px solid #222; border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-title { font-family:'Playfair Display',serif; font-size:20px; }
  .loading-sub { font-size:13px; color:var(--muted); }
  .error-msg { display:none; background:#1a1010; border:1px solid #4a2020; color:var(--danger); padding:12px 16px; font-size:13px; margin-top:16px; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-title">Generating your Anschreiben</div>
  <div class="loading-sub">Groq is writing your cover letter — about 10 seconds</div>
</div>

<div class="wrapper">
  <div class="header">
    <div class="logo">Fe<span>d</span>er</div>
    <div class="tagline">Anschreiben Generator</div>
  </div>

  <div class="card">
    <div class="row-toggles">
      <div class="toggle-group">
        <span class="toggle-label">Language</span>
        <div class="toggles">
          <button class="toggle-btn active" onclick="setToggle('language','DE',this)">🇩🇪 DE</button>
          <button class="toggle-btn" onclick="setToggle('language','EN',this)">🇬🇧 EN</button>
        </div>
      </div>
      <div class="toggle-group">
        <span class="toggle-label">Tone</span>
        <div class="toggles">
          <button class="toggle-btn active" onclick="setToggle('tone','formal',this)">Formal</button>
          <button class="toggle-btn" onclick="setToggle('tone','semi-formal',this)">Semi-Formal</button>
        </div>
      </div>
    </div>

    <label class="field-label">Job Posting</label>
    <textarea id="job_posting" placeholder="Paste the full job description here. Company name, role, address, requirements — everything. The AI extracts what it needs and writes your Anschreiben automatically."></textarea>

    <div class="error-msg" id="error-msg">Something went wrong. Check your Groq API key and try again.</div>

    <div class="card-footer">
      <span class="hint">Company, role &amp; address<br>extracted automatically</span>
      <button class="btn-generate" id="btn-generate" onclick="generate()">Generate PDF →</button>
    </div>
  </div>
</div>

<script>
  const state = { language: 'DE', tone: 'formal' };
  function setToggle(key, value, btn) {
    state[key] = value;
    btn.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  async function generate() {
    const text = document.getElementById('job_posting').value.trim();
    if (!text) return;
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('loadingOverlay').classList.add('visible');
    document.getElementById('btn-generate').disabled = true;
    const fd = new FormData();
    fd.append('job_posting', text);
    fd.append('language', state.language);
    fd.append('tone', state.tone);
    try {
      const res = await fetch('/generate', { method: 'POST', body: fd });
      if (!res.ok) throw new Error();
      const disposition = res.headers.get('Content-Disposition') || '';
      const match = disposition.match(/filename=(.+)/);
      const filename = match ? match[1] : 'Anschreiben.pdf';
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    } catch {
      document.getElementById('error-msg').style.display = 'block';
    } finally {
      document.getElementById('loadingOverlay').classList.remove('visible');
      document.getElementById('btn-generate').disabled = false;
    }
  }
</script>
</body>
</html>
